services:
  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_password
      POSTGRES_DB: hermes_kanban
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_kanban"]
      interval: 10s
      timeout: 5s
      retries: 5

  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
    container_name: hermes-gateway
    restart: unless-stopped
    ports:
      - "8642:8642"
    volumes:
      - hermes_data:/data
      - ~/.hermes/profiles:/data/profiles
    environment:
      - HERMES_HOME=/data
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_KEY:-change-me-local-dev}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - LLM_MODEL=${LLM_MODEL:-glm-5.1}
      - LLM_PROVIDER=${LLM_PROVIDER:-opencode-go}
      # LLM Provider keys (choose ONE):
      # Option 1: opencode-go (default, recommended)
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY:-}
      # Option 2: OpenRouter (one key, many models)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Option 3: Anthropic directly
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Option 4: OpenAI directly
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Option 5: Custom OpenAI-compatible endpoint
      - CUSTOM_LLM_BASE_URL=${CUSTOM_LLM_BASE_URL:-}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5

  # Optional: Next.js app (for production)
  # Uncomment to run the Next.js app in Docker
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.app
  #   container_name: hermes-kanban-app
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://hermes:hermes_password@postgres:5432/hermes_kanban
  #     - HERMES_GATEWAY_URL=http://hermes:8642
  #     - HERMES_API_KEY=${HERMES_API_KEY:-change-me-local-dev}
  #     - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-your-secret-key-here}
  #     - BETTER_AUTH_URL=http://localhost:3000
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     hermes:
  #       condition: service_healthy

volumes:
  postgres_data:
  hermes_data: